name: code-quality

# CI-based SonarCloud analysis + Codecov coverage upload, sharing a single build and
# wide/narrow test pass. The SonarCloud half REPLACES SonarCloud's Automatic Analysis:
# disable it under Project > Administration > Analysis Method, or this scan is
# rejected (the two modes are mutually exclusive). Unlike Automatic Analysis,
# the SonarScanner for .NET sees the MSBuild graph and imports test coverage.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonar:
    name: sonar
    runs-on: ubuntu-latest
    # The scanner reads the token from SONAR_TOKEN; pass it via the environment rather
    # than expanding the secret inside a run block, where it can leak (githubactions:S7636).
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Sonar needs full history for new-code detection and blame

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      # The Sonar analysis engine is JVM-based; the .NET scanner shells out to it.
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore src/KerckhoffsLabs.sln --locked-mode

      - name: Begin analysis
        run: >
          dotnet sonarscanner begin
          /k:"KerckhoffsLabs_KerckhoffsLabs.Runtime.InteropServices"
          /o:"kerckhoffslabs"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml"

      - name: Build
        run: dotnet build src/KerckhoffsLabs.sln --no-restore -c Release

      # Cover both NativeCULong layouts so Sonar sees the #if WINDOWS branch too: the
      # wide (nuint) build reuses the Build above; the narrow (uint) build is selected
      # by $(NativeCULongNarrow) and rebuilt here. Each run emits BOTH coverage formats
      # in a single pass — OpenCover (Sonar's first-class .NET format, imported by the
      # begin-step glob) and Cobertura (uploaded to Codecov below) — so the test suite
      # is built and executed once instead of duplicated across a separate workflow.
      - name: Test with coverage (wide / nuint)
        run: >
          dotnet test src/KerckhoffsLabs.sln --no-build -c Release
          --collect:"XPlat Code Coverage;Format=opencover,cobertura"
          --results-directory ./coverage
          --logger "console;verbosity=normal"

      - name: Test with coverage (narrow / uint)
        run: >
          dotnet test src/KerckhoffsLabs.sln --no-restore -c Release -p:NativeCULongNarrow=true
          --collect:"XPlat Code Coverage;Format=opencover,cobertura"
          --results-directory ./coverage
          --logger "console;verbosity=normal"

      # Upload the Cobertura reports to Codecov. Push-only to preserve the previous
      # coverage workflow's trigger (and to avoid touching fork PRs, where the token is
      # unavailable). Runs before End analysis so a Codecov hiccup is independent of the
      # Sonar import.
      - name: Upload coverage
        if: github.event_name == 'push'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/**/coverage.cobertura.xml
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: End analysis
        run: dotnet sonarscanner end
