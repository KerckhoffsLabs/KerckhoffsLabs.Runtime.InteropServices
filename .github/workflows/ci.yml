name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore src/KerckhoffsLabs.sln --locked-mode

      - run: dotnet format src/KerckhoffsLabs.sln --verify-no-changes --no-restore

  build-and-test:
    name: ${{ matrix.os }}${{ matrix.arch == 'x86' && ' (x86)' || '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: ubuntu-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: windows-latest
            arch: x86

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'
          architecture: ${{ matrix.arch }}

      - name: Restore
        run: dotnet restore src/KerckhoffsLabs.sln --locked-mode

      # The library is single-target net10.0; the WINDOWS storage build is selected by
      # $(NativeCULongNarrow), not a TFM. Run the suite in both modes so each NativeCULong
      # layout (nuint and uint) is exercised regardless of host OS.
      - name: Test (wide / nuint)
        run: dotnet test src/KerckhoffsLabs.sln --no-restore -c Release --logger "console;verbosity=normal"

      - name: Test (narrow / uint)
        run: dotnet test src/KerckhoffsLabs.sln --no-restore -c Release -p:NativeCULongNarrow=true --logger "console;verbosity=normal"

  integration:
    name: integration-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # win-arm64 is not vanity coverage: the package ships a runtimes/win-arm64 narrow asset that
        # nothing else in CI ever loads. The Unix arm64 legs (macos-latest is Apple Silicon) are
        # LP64 like linux-x64 and so expect the same widths, but are different ABIs and codegen
        # paths, and macOS is a third OS resolving the lib/net10.0 fallback.
        # NOTE: 32-bit Unix (ILP32) remains unexercised — .NET has no linux-x86 runtime at all, and
        # the one ILP32 target it does support (linux-arm / Arm32) has no hosted runner.
        os: [macos-latest, ubuntu-24.04-arm, ubuntu-latest, windows-11-arm, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: install AOT toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      # End-to-end proof of the shipped artifact: pack the real package, then a plain net10.0
      # consumer (no RID, no -windows TFM) must report the correct unsigned-long width per OS
      # (4 on Windows, pointer width on Unix) on both the JIT and NativeAOT. The consumer's
      # exit code is the assertion.
      - name: pack + consume (JIT and AOT)
        shell: bash
        run: |
          set -e
          dotnet pack src/KerckhoffsLabs.Runtime.InteropServices/KerckhoffsLabs.Runtime.InteropServices.csproj \
            -c Release -o tests/feed
          cd tests/Integration
          echo "===== JIT ====="
          dotnet run -c Release
          # Derive the RID from the runner rather than hardcoding it: the matrix spans x64 and arm64
          # on both OSes, and publishing win-x64 on an arm64 runner would silently test the wrong asset.
          case "$RUNNER_OS/$RUNNER_ARCH" in
            Linux/ARM64)   rid=linux-arm64 ;;
            Linux/X64)     rid=linux-x64   ;;
            macOS/ARM64)   rid=osx-arm64   ;;
            macOS/X64)     rid=osx-x64     ;;
            Windows/ARM64) rid=win-arm64   ;;
            Windows/X64)   rid=win-x64     ;;
            *) echo "unhandled runner $RUNNER_OS/$RUNNER_ARCH" >&2; exit 1 ;;
          esac
          echo "===== NativeAOT ($rid) ====="
          dotnet publish -c Release -r "$rid" -p:PublishAot=true -o aotout
          if [ "$RUNNER_OS" = "Windows" ]; then ./aotout/Integration.exe; else ./aotout/Integration; fi

      # The only leg that covers the "Windows 32-bit -> lib/net10.0" row of the RID table: win-x86
      # must resolve the WIDE (nuint) asset, not the narrow win-x64 one, because in a 32-bit process
      # nuint is already 4 bytes — the correct unsigned long width. Getting the narrow asset here
      # would be equally correct by luck; getting a 64-bit-wide one would be a real bug.
      #
      # It has to be a self-contained publish: GitHub has no 32-bit runner (so the app must carry
      # its own x86 runtime and run under WOW64 on the x64 one), and NativeAOT is JIT-only here
      # because ILC has no x86 target.
      #
      # Pinned to the x64 Windows runner. Windows-on-ARM can emulate x86, so this would likely also
      # pass on windows-11-arm, but it would be measuring the emulator rather than the RID graph.
      - name: consume (win-x86, 32-bit)
        if: runner.os == 'Windows' && runner.arch == 'X64'
        shell: bash
        run: |
          set -e
          cd tests/Integration
          echo "===== JIT (win-x86, self-contained) ====="
          dotnet publish -c Release -r win-x86 --self-contained true -o x86out
          ./x86out/Integration.exe
