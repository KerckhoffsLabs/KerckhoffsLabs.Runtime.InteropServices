name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore src/KerckhoffsLabs.sln --locked-mode

      - run: dotnet format src/KerckhoffsLabs.sln --verify-no-changes --no-restore

  build-and-test:
    name: ${{ matrix.os }}${{ matrix.arch == 'x86' && ' (x86)' || '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: windows-latest
            arch: x86

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'
          architecture: ${{ matrix.arch || 'x64' }}

      - name: Restore
        run: dotnet restore src/KerckhoffsLabs.sln --locked-mode

      - name: Build
        run: dotnet build src/KerckhoffsLabs.sln --no-restore -c Release

      - name: Test
        run: dotnet test src/KerckhoffsLabs.sln --no-build -c Release --logger "console;verbosity=normal"
