name: sonar

# CI-based SonarCloud analysis. This REPLACES SonarCloud's Automatic Analysis:
# disable it under Project > Administration > Analysis Method, or this scan is
# rejected (the two modes are mutually exclusive). Unlike Automatic Analysis,
# the SonarScanner for .NET sees the MSBuild graph and imports test coverage.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonar:
    name: sonar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Sonar needs full history for new-code detection and blame

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      # The Sonar analysis engine is JVM-based; the .NET scanner shells out to it.
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore src/KerckhoffsLabs.sln --locked-mode

      - name: Begin analysis
        run: >
          dotnet sonarscanner begin
          /k:"KerckhoffsLabs_KerckhoffsLabs.Runtime.InteropServices"
          /o:"kerckhoffslabs"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml"

      - name: Build
        run: dotnet build src/KerckhoffsLabs.sln --no-restore -c Release

      # Cover both NativeCULong layouts so Sonar sees the #if WINDOWS branch too: the
      # wide (nuint) build reuses the Build above; the narrow (uint) build is selected
      # by $(NativeCULongNarrow) and rebuilt here. OpenCover (not the default cobertura)
      # is Sonar's first-class .NET coverage format; both runs land under ./coverage and
      # the begin-step glob merges them.
      - name: Test with coverage (wide / nuint)
        run: >
          dotnet test src/KerckhoffsLabs.sln --no-build -c Release
          --collect:"XPlat Code Coverage;Format=opencover"
          --results-directory ./coverage
          --logger "console;verbosity=normal"

      - name: Test with coverage (narrow / uint)
        run: >
          dotnet test src/KerckhoffsLabs.sln --no-restore -c Release -p:NativeCULongNarrow=true
          --collect:"XPlat Code Coverage;Format=opencover"
          --results-directory ./coverage
          --logger "console;verbosity=normal"

      - name: End analysis
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
