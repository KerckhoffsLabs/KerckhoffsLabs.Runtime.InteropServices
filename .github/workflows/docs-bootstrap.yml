name: Docs (bootstrap)

# TEMPORARY one-time workflow: seeds the GitHub Pages site from this branch so the
# initial deploy doesn't have to wait for a release tag. Triggered by push to the
# docs/deploy-pages branch (workflow_dispatch only works from the default branch).
# DELETE this file once the site is live — ongoing updates are handled by publish.yml.
on:
  push:
    branches: [ docs/deploy-pages ]

# Serialize Pages deployments; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read   # checkout
      pages: read      # configure-pages reads the site config
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Install docfx
        run: dotnet tool install --global docfx

      - name: Build documentation (metadata + site)
        run: docfx docs/docfx.json --warningsAsErrors

      # Pages must already be enabled with "GitHub Actions" as the source
      # (Settings -> Pages); the workflow token cannot create the site itself.
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write     # deploy-pages publishes the artifact
      id-token: write  # deploy-pages authenticates to the Pages API via OIDC
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
