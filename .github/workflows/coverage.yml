name: coverage

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/KerckhoffsLabs.sln --locked-mode

      - name: Build
        run: dotnet build src/KerckhoffsLabs.sln --no-restore -c Release

      # Cover both NativeCULong layouts: the wide (nuint) build reuses the Build above; the
      # narrow (uint) build is selected by $(NativeCULongNarrow) and rebuilt here so the
      # #if WINDOWS branch (uint storage + the checked nuint ctor) is exercised too. Codecov
      # merges the coverage.cobertura.xml from both runs.
      - name: Test with coverage (wide / nuint)
        run: >
          dotnet test src/KerckhoffsLabs.sln --no-build -c Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --logger "console;verbosity=normal"

      - name: Test with coverage (narrow / uint)
        run: >
          dotnet test src/KerckhoffsLabs.sln --no-restore -c Release -p:NativeCULongNarrow=true
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --logger "console;verbosity=normal"

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/**/coverage.cobertura.xml
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
