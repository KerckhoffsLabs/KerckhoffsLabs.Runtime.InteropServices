name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing
      attestations: write  # required for attest-build-provenance

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # required to resolve the tag ref

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      # Derive the version from the tag once so the build stamps it into the
      # assembly (AssemblyVersion/FileVersion/InformationalVersion), not just the
      # package. The --no-build pack below then reuses the versioned assemblies.
      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - run: dotnet restore src/KerckhoffsLabs.sln --locked-mode

      - run: dotnet build src/KerckhoffsLabs.sln --no-restore -c Release /p:Version=$VERSION

      - run: dotnet test src/KerckhoffsLabs.sln --no-build -c Release

      - name: Pack
        run: dotnet pack src/KerckhoffsLabs.Runtime.InteropServices/KerckhoffsLabs.Runtime.InteropServices.csproj --no-build -c Release -o ./artifacts /p:Version=$VERSION

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ./artifacts/*.nupkg

      - name: NuGet login (OIDC)
        uses: nuget/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
